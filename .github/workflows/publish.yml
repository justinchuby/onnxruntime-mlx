name: publish

# Publishes the onnxruntime-mlx wheel to PyPI via Trusted Publishing (OIDC, no API token).
#
# ⚠️ VERIFY against your PyPI trusted-publisher configuration before the first release:
#   - PyPI project name          : onnxruntime-mlx   (must match [project].name in python/pyproject.toml)
#   - Workflow filename          : publish.yml       (this file)
#   - GitHub environment         : pypi              (the `environment:` on the publish job below)
# If your trusted publisher uses a different project name or environment (or none), update them here.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-wheels:
    name: Build wheels (macOS arm64)
    runs-on: macos-14
    env:
      ORT_VERSION: "1.27.0"
    steps:
      - uses: actions/checkout@v4

      - name: Install mlx-c (hard dependency)
        run: brew install mlx-c

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Provide onnx-genai sibling (pure-Rust tracer dependency)
        run: git clone --depth 1 https://github.com/justinchuby/onnx-genai ../onnx-genai

      - name: Provision ONNX Runtime ${{ env.ORT_VERSION }}
        run: |
          set -euo pipefail
          curl -fsSL \
            "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-osx-arm64-${ORT_VERSION}.tgz" \
            | tar xz
          echo "ORT_HOME=$PWD/onnxruntime-osx-arm64-${ORT_VERSION}" >> "$GITHUB_ENV"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build the wheel (hatchling; cargo dylib + mlx bundled)
        run: |
          python -m pip install --upgrade pip build
          # hatch_build.py runs `cargo build --release`, bundles the cargo-built
          # libonnxruntime_mlx_ep.dylib + the mlx runtime (install_name_tool relink),
          # and forces a single py3-none-macosx_*_arm64 platform wheel. No CPython
          # ABI is embedded, so one wheel serves 3.12/3.13 and the free-threaded
          # builds alike.
          ORT_INCLUDE_DIR="$ORT_HOME/include" MACOSX_DEPLOYMENT_TARGET=14.0 \
            python -m build --wheel ./python -o wheelhouse
          ls -la wheelhouse

      - name: Audit wheels (abi3audit — no native Python ABI to violate)
        run: |
          python -m pip install --upgrade abi3audit
          # No compiled Python extension ships in the wheel, so abi3audit finds
          # nothing auditable and --strict passes (abi3-clean by construction).
          python -m abi3audit --strict --report wheelhouse/*.whl

      - uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: wheelhouse/*.whl

  publish:
    name: Publish to PyPI (Trusted Publishing)
    needs: build-wheels
    runs-on: ubuntu-latest
    # OIDC trusted publishing — no PyPI token. Environment name must match the trusted-publisher config.
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheels
          path: dist

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
