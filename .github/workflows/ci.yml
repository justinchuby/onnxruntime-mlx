name: CI

on:
  push:
    branches: [main]
  pull_request:

# Apple Silicon only: the MLX EP requires Metal + mlx-c (macos-14 runners are arm64).
jobs:
  build-test:
    name: Build + op tests (macOS arm64)
    runs-on: macos-14
    env:
      ORT_VERSION: "1.27.0"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install mlx-c (hard dependency)
        run: brew install mlx-c

      - name: Install Rust toolchain (rustup — no third-party action, supply-chain hardening)
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
          rustc --version && cargo --version

      # The EP crate depends on the pure-Rust `onnx-runtime-tracer` (observability
      # only) at ../../onnx-genai/crates/onnx-runtime-tracer — a sibling of the repo
      # root. Clone it so cargo can resolve the path dependency (public repo).
      - name: Provide onnx-genai sibling (pure-Rust tracer dependency)
        run: git clone --depth 1 https://github.com/justinchuby/onnx-genai ../onnx-genai

      - name: Provision ONNX Runtime ${{ env.ORT_VERSION }}
        run: |
          set -euo pipefail
          curl -fsSL \
            "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-osx-arm64-${ORT_VERSION}.tgz" \
            | tar xz
          echo "ORT_HOME=$PWD/onnxruntime-osx-arm64-${ORT_VERSION}" >> "$GITHUB_ENV"

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Python test deps
        run: python -m pip install --upgrade "onnxruntime==${ORT_VERSION}" numpy onnx onnx_ir pytest pytest-forked

      - name: Build the Rust EP (cargo)
        run: |
          cd rust
          # -D warnings: the tree is warning-clean; fail CI on any new dead-code / unused drift.
          ORT_INCLUDE_DIR="$ORT_HOME/include" RUSTFLAGS="-D warnings" cargo build --release
          test -f target/release/libonnxruntime_mlx_ep.dylib

      - name: Op-correctness tests (pytest, MLX vs ORT CPU)
        run: |
          export ONNXRUNTIME_MLX_EP_LIB="$PWD/rust/target/release/libonnxruntime_mlx_ep.dylib"
          export DYLD_LIBRARY_PATH="$ORT_HOME/lib"
          python -m pytest tests/ops -q

      - name: ONNX backend node tests (informational — MLX EP vs ONNX reference)
        # Runs ONNX's own curated per-node tests through the MLX EP. `--forked` isolates each
        # case (a bad case can't take down the suite). NON-BLOCKING for now: a known residual set
        # of ORT/ONNX-inherent cases is excluded in the harness, and a small genuine-MLX tail is
        # still being triaged — this step reports the count without gating PRs. Flip
        # `continue-on-error` off once the residual failures are closed.
        continue-on-error: true
        run: |
          export ONNXRUNTIME_MLX_EP_LIB="$PWD/rust/target/release/libonnxruntime_mlx_ep.dylib"
          export DYLD_LIBRARY_PATH="$ORT_HOME/lib"
          python -m pytest tests/backend -q -p no:cacheprovider --forked \
            | tee /tmp/backend.out || true
          {
            echo "### ONNX backend node tests (MLX EP)"
            echo '```'
            tail -n 3 /tmp/backend.out
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  python-wheel:
    name: Python package smoke (macOS arm64)
    runs-on: macos-14
    env:
      ORT_VERSION: "1.27.0"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install mlx-c (hard dependency)
        run: brew install mlx-c

      - name: Install Rust toolchain (rustup — no third-party action, supply-chain hardening)
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
          rustc --version && cargo --version

      - name: Provide onnx-genai sibling (pure-Rust tracer dependency)
        run: git clone --depth 1 https://github.com/justinchuby/onnx-genai ../onnx-genai

      - name: Provision ONNX Runtime ${{ env.ORT_VERSION }}
        run: |
          set -euo pipefail
          curl -fsSL \
            "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-osx-arm64-${ORT_VERSION}.tgz" \
            | tar xz
          echo "ORT_HOME=$PWD/onnxruntime-osx-arm64-${ORT_VERSION}" >> "$GITHUB_ENV"

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Build the wheel (hatchling; cargo dylib + mlx bundled)
        run: |
          python -m pip install --upgrade pip build
          # The build hook runs `cargo build --release` (honouring ORT_INCLUDE_DIR),
          # bundles the cargo dylib + mlx runtime, and forces a py3-none platform tag.
          ORT_INCLUDE_DIR="$ORT_HOME/include" MACOSX_DEPLOYMENT_TARGET=14.0 \
            python -m build --wheel ./python -o dist
          ls -la dist
          # One pure-Python platform wheel (no CPython ABI) serves 3.12/3.13/free-threaded.
          test -n "$(ls dist/onnxruntime_mlx-*-py3-none-macosx_*_arm64.whl 2>/dev/null)"

      - name: Audit the wheel (abi3audit — no native Python ABI to violate)
        run: |
          python -m pip install --upgrade abi3audit
          # The wheel ships no compiled Python extension, so abi3audit finds nothing
          # auditable and --strict passes: the wheel is abi3-clean by construction.
          python -m abi3audit --strict --report dist/onnxruntime_mlx-*-py3-none-macosx_*_arm64.whl

      - name: Import + register under Python 3.13 (proves cross-version portability)
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - name: Cross-version smoke test
        run: |
          python -m pip install --upgrade "onnxruntime==${ORT_VERSION}"
          python -m pip install dist/onnxruntime_mlx-*-py3-none-macosx_*_arm64.whl
          export DYLD_LIBRARY_PATH="$ORT_HOME/lib"
          python - <<'PY'
          import os, sys, onnxruntime_mlx as m
          print("python", sys.version.split()[0])
          print("version", m.version(), "ep", m.ep_name(), "lib", m.library_path())
          assert os.path.isfile(m.library_path())
          m.register_execution_provider_library()
          print("registered OK")
          PY
