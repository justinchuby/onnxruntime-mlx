name: conformance (onnx-tests)

# Opt-in ONLY. Fuzz-conformance of the MLX EP against the ONNX standard using
# cbourjau/onnx-tests. This is deliberately NOT wired into the required CI
# (ci.yml): it depends on pixi + network + a cargo build and is too
# heavy/flaky to gate PRs. Trigger it by hand from the Actions tab.
on:
  workflow_dispatch:
    inputs:
      max_examples:
        description: "Hypothesis max_examples per test (bounded fuzzing)"
        default: "20"
        required: false
      seed:
        description: "Hypothesis seed"
        default: "0"
        required: false
      ops:
        description: "Optional space-separated op subset (blank = full claimed set)"
        default: ""
        required: false

# Apple Silicon only: the MLX EP requires Metal + mlx-c (macos-14 runners are arm64).
jobs:
  conformance:
    name: onnx-tests vs MLX EP (macOS arm64)
    runs-on: macos-14
    env:
      ORT_VERSION: "1.27.0"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install mlx-c (hard dependency)
        run: brew install mlx-c

      - name: Install Rust toolchain (rustup — no third-party action, supply-chain hardening)
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
          rustc --version && cargo --version

      - name: Provision ONNX Runtime ${{ env.ORT_VERSION }}
        run: |
          set -euo pipefail
          curl -fsSL \
            "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-osx-arm64-${ORT_VERSION}.tgz" \
            | tar xz
          echo "ORT_HOME=$PWD/onnxruntime-osx-arm64-${ORT_VERSION}" >> "$GITHUB_ENV"

      - name: Build the Rust EP (cargo)
        run: |
          set -euo pipefail
          cd rust
          ORT_INCLUDE_DIR="$ORT_HOME/include" cargo build --release
          test -f target/release/libonnxruntime_mlx_ep.dylib

      - name: Install pixi
        run: |
          curl -fsSL https://pixi.sh/install.sh | bash
          echo "$HOME/.pixi/bin" >> "$GITHUB_PATH"

      - name: Clone + install onnx-tests (sibling), pin onnxruntime 1.27
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/cbourjau/onnx-tests ../onnx-tests
          (cd ../onnx-tests && pixi run postinstall)
          # The EP needs ORT_API_VERSION 27; the pixi env ships an older ort.
          (cd ../onnx-tests && pixi run python -m pip install "onnxruntime==${ORT_VERSION}")

      - name: Run bounded conformance subset (pytest-driven)
        # Never fail the workflow on EP crashes/failures — this is a fuzzing
        # report, captured as an artifact for triage.
        continue-on-error: true
        env:
          ONNX_TESTS_DIR: ${{ github.workspace }}/../onnx-tests
          MLX_EP_LIB: ${{ github.workspace }}/rust/target/release/libonnxruntime_mlx_ep.dylib
          ORT_LIB_DIR: ${{ env.ORT_HOME }}/lib
          MAX_EXAMPLES: ${{ github.event.inputs.max_examples }}
          SEED: ${{ github.event.inputs.seed }}
          OPS: ${{ github.event.inputs.ops }}
        run: |
          set -uo pipefail
          # The outer pytest driver only needs pytest + stdlib (each op is fuzzed
          # in its own `pixi run` subprocess, so onnxruntime/onnx-tests live there).
          python3 -m pip install --quiet --user pytest
          python3 -m pytest tests/conformance/test_conformance.py -v \
            --junitxml=tests/conformance/conformance-junit.xml \
            | tee tests/conformance/conformance.out || true
          {
            echo "### onnx-tests conformance (MLX EP)"
            echo '```'
            tail -n 40 tests/conformance/conformance.out
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: conformance-results
          path: |
            tests/conformance/conformance-junit.xml
            tests/conformance/conformance.out
          if-no-files-found: warn
